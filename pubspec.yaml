name: show_agenda
description: Gerenciar datas e cachês
publish_to: 'none'
version: 1.1.2+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI / Calendar
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  flutter_local_notifications: ^18.0.0
  
  # Icons & Design
  cupertino_icons: ^1.0.6
  iconsax: ^0.0.8
  http: ^1.2.2
  path_provider: ^2.1.4
  package_info_plus: ^8.0.0
  open_filex: ^4.7.0
  permission_handler: ^11.0.0

  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/drumvoxduo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/drumvoxduo_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/